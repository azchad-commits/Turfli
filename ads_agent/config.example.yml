# Turfli Ads Agent Configuration
# Copy this file to config.yml and fill in your credentials.
# config.yml is gitignored — never commit it.

anthropic_api_key: "sk-ant-..."  # Or set ANTHROPIC_API_KEY env var

google:
  # From your Google Ads account and Google Cloud console
  developer_token: "YOUR_DEVELOPER_TOKEN"
  client_id: "YOUR_OAUTH_CLIENT_ID"
  client_secret: "YOUR_OAUTH_CLIENT_SECRET"
  refresh_token: "YOUR_OAUTH_REFRESH_TOKEN"
  login_customer_id: "1234567890"     # MCC account ID (no dashes)
  customer_id: "1234567890"           # Turfli ad account ID (no dashes)
  use_proto_plus: true

meta:
  # From Meta Business Manager > System Users > API
  access_token: "YOUR_META_LONG_LIVED_ACCESS_TOKEN"
  account_id: "1234567890"            # Without the act_ prefix
  app_id: "YOUR_APP_ID"
  app_secret: "YOUR_APP_SECRET"

# Agent behavior settings
settings:
  default_platform: "both"          # google | meta | both
  dry_run_by_default: true          # Set false to apply changes automatically
  max_budget_increase_pct: 30       # Never increase any budget by more than this %
  min_budget_usd: 10                # Never drop a budget below this
  report_email: "hello@turfli.com"  # Where to send weekly reports (future feature)
